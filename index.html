<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Materiales</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div id="login-container" class="container">
    <header>
        <div style="background-color: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: center;">
            <img src="https://raw.githubusercontent.com/josueortizp87-code/App-Cuadrillas-Distribucion/refs/heads/main/imagenes/UTCD%20Vertical.png" alt="Logo ENEE" style="max-width: 250px; height: auto;">
        </div>
        <h1>Acceso al Sistema</h1>
    </header>
    <div class="card" style="padding: 20px;">
        <label>Seleccione su Sector:</label>
        <select id="user">
            <option value="">Seleccione...</option>
            <option value="juticalpa">JUTICALPA</option>
            <option value="la ceiba">LA CEIBA</option>
            <option value="san pedro sula">SAN PEDRO SULA</option>
            <option value="tegucigalpa">TEGUCIGALPA</option>
            </select>

        <label>Contraseña:</label>
        <input type="password" id="pass" placeholder="Ingrese su contraseña">
        
        <button class="btn-enviar" onclick="validarLogin()">INGRESAR</button>
        <p id="login-error" style="color: #e74c3c; font-size: 0.8rem; margin-top: 10px; display: none;">Credenciales incorrectas</p>
    </div>
</div>

<div id="app-container" class="container" style="display: none;">
    <header>
        <div style="background-color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: center;">
            <img src="https://raw.githubusercontent.com/josueortizp87-code/App-Cuadrillas-Distribucion/refs/heads/main/imagenes/UTCD%20Vertical.png" alt="Logo ENEE" style="max-width: 180px; height: auto;">
        </div>
        <h1>CALCULO DE MATERIALES</h1>
        <p id="user-display" style="color: var(--accent); font-weight: bold; font-size: 0.8rem;"></p>
    </header>

    <div>
        <label>Agregar Estructura al Proyecto:</label>
        <div class="grid-2">
            <div>
                <select id="select-estructura">
                    <option value="">Seleccionar estructura...</option>
                    </select>
            </div>
            <div>
                <input type="number" id="input-cantidad" min="1" value="1" placeholder="Cant.">
            </div>
        </div>
        
        <button type="button" class="btn-secundario" onclick="agregarEstructura()">
            <i class="fas fa-plus"></i> AÑADIR A LA LISTA
        </button>

        <label>Estructuras Agregadas:</label>
        <ul id="lista-estructuras" class="lista-agregados">
            </ul>

        <div class="resumen-container">
            <h3 style="color: var(--accent); margin-top: 0; font-size: 1rem; text-align: center;">RESUMEN TOTAL DE MATERIALES</h3>
            <table class="tabla-materiales">
                <thead>
                    <tr>
                        <th>Material Requerido</th>
                        <th style="width: 20%; text-align: center;">Total</th>
                    </tr>
                </thead>
                <tbody id="tabla-body-materiales">
                    <tr><td colspan="2" style="text-align:center; color: #9aa7b1;">Aún no hay estructuras agregadas</td></tr>
                </tbody>
            </table>
        </div>

        <button type="button" class="btn-enviar" onclick="limpiarProyecto()">NUEVO PROYECTO</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
