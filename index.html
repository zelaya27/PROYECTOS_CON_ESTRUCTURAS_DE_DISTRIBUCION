<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE - Calculadora de Materiales</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Definimos nuestros colores corporativos */
        :root {
            --bg: #0f1a24;
            --card: #16232f;
            --accent: #f4c430; /* Amarillo ENEE */
            --text: #ffffff;
            --border: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
        }

        .container { max-width: 500px; margin: auto; }

        header { text-align: center; border-bottom: 1px solid var(--border); margin-bottom: 15px; padding-bottom: 10px; }
        header h1 { font-size: 1.2rem; color: var(--accent); margin-top: 10px; }

        /* Estilo de las cajas contenedoras */
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }

        /* Estilo de los textos indicativos */
        label { display: block; margin-top: 20px; color: var(--accent); font-size: 0.75rem; font-weight: bold; border-left: 3px solid var(--accent); padding-left: 10px; text-transform: uppercase; }

        /* Estilo de las cajas donde el usuario escribe o selecciona */
        input, select { width: 100%; padding: 12px; background: #1b2a36; border: 1px solid var(--border); color: white; border-radius: 8px; margin-top: 5px; box-sizing: border-box; }

        .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }

        /* Estilos de los botones amarillo y transparente */
        .btn-enviar { background: var(--accent); color: #000; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; margin-top: 25px; cursor: pointer; }
        .btn-secundario { background: transparent; color: var(--accent); width: 100%; padding: 10px; border: 2px solid var(--accent); border-radius: 8px; margin-top: 10px; font-weight: bold; cursor: pointer; }

        /* Estilos de la tabla de resultados finales */
        .resumen-container { background: var(--card); padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px dashed var(--accent); }
        .tabla-materiales { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 10px;}
        .tabla-materiales th { background: var(--accent); color: #000; padding: 8px; border: 1px solid var(--border); }
        .tabla-materiales td { padding: 8px; border: 1px solid var(--border); text-align: center; }
        
        .lista-agregados { list-style: none; padding: 0; }
        .lista-agregados li { background: #1b2a36; padding: 10px; margin-bottom: 5px; border-radius: 6px; display: flex; justify-content: space-between; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

    <div id="login-container" class="container">
        <header>
            <div style="background-color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: center;">
                <img src="https://raw.githubusercontent.com/josueortizp87-code/App-Cuadrillas-Distribucion/refs/heads/main/imagenes/UTCD%20Vertical.png" alt="Logo" style="max-width: 250px;">
            </div>
            <h1>Acceso al Sistema</h1>
        </header>
        <div class="card">
            <label>Seleccione su Sector:</label>
            <select id="user">
                <option value="">Seleccione...</option>
                <option value="juticalpa">JUTICALPA</option>
                <option value="la ceiba">LA CEIBA</option>
                <option value="san pedro sula">SAN PEDRO SPLA</option>
                <option value="tegucigalpa">TEGUCIGALPA</option>
                <option value="danli">DANLÍ</option>
                <option value="choluteca">CHOLUTECA</option>
            </select>
            <label>Contraseña:</label>
            <input type="password" id="pass" placeholder="Ingrese contraseña">
            <button class="btn-enviar" onclick="validarLogin()">INGRESAR</button>
            <p id="login-error" style="color: #e74c3c; font-size: 0.8rem; display: none;">Credenciales incorrectas</p>
        </div>
    </div>

    <div id="app-container" class="container" style="display: none;">
        <header>
            <div style="background-color: white; padding: 10px; border-radius: 8px; display: flex; justify-content: center;">
                <img src="https://raw.githubusercontent.com/josueortizp87-code/App-Cuadrillas-Distribucion/refs/heads/main/imagenes/UTCD%20Vertical.png" alt="Logo" style="max-width: 180px;">
            </div>
            <h1>CÁLCULO DE MATERIALES</h1>
            <p id="user-display" style="color: var(--accent); font-weight: bold;"></p>
        </header>

        <div class="card" style="text-align: left;">
            <label>Estructura a agregar:</label>
            <div class="grid-2">
                <select id="select-estructura"><option value="">Sincronizando con Drive...</option></select>
                <input type="number" id="input-cantidad" min="1" value="1">
            </div>
            <button type="button" class="btn-secundario" onclick="agregarEstructura()">
                <i class="fas fa-plus"></i> AÑADIR A LA LISTA
            </button>
        </div>

        <label>Lista del Proyecto:</label>
        <ul id="lista-estructuras" class="lista-agregados"></ul>

        <div class="resumen-container">
            <h3 style="color: var(--accent); text-align: center; margin-top:0;">RESUMEN MATERIALES</h3>
            <table class="tabla-materiales">
                <thead>
                    <tr><th>CANT.</th><th>UNIDAD</th><th>CÓDIGO</th><th>DESCRIPCIÓN</th></tr>
                </thead>
                <tbody id="tabla-body-materiales">
                    <tr><td colspan="4" style="text-align:center; color: #9aa7b1;">No hay estructuras</td></tr>
                </tbody>
            </table>
        </div>
        <button type="button" class="btn-enviar" onclick="limpiarProyecto()" style="background: #c0392b; color: white;">NUEVO PROYECTO</button>
    </div>

    <script>
        // La dirección a tu Google Sheet
        const URL_API = "https://script.google.com/macros/s/AKfycbyPOrzRMPjppI77GDw92aVWzMP382eVNrv3XJ9yqRBAWYEwVxjwoUpzh_SnHWccMIxiIg/exec";
        
        // Las contraseñas permitidas
        const USUARIOS = {
            "admin": "admin123", "juticalpa": "enee2026", "la ceiba": "enee2026",
            "san pedro sula": "enee2026", "tegucigalpa": "enee2026", "danli": "enee2026", "choluteca": "enee2026"
        };

        // Memorias de la aplicación
        let BASE_DE_DATOS = {};
        let proyecto = [];

        // Función que verifica si la contraseña es correcta
        function validarLogin() {
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value;

            if (USUARIOS[u] && USUARIOS[u] === p) {
                document.getElementById('login-container').style.display = 'none'; // Oculta login
                document.getElementById('app-container').style.display = 'block'; // Muestra app
                document.getElementById('user-display').innerText = "Sector: " + u.toUpperCase();
                cargarDatos(); // Llama a Google Drive
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        // Función que descarga las estructuras desde Google Sheets
        async function cargarDatos() {
            try {
                const respuesta = await fetch(URL_API);
                BASE_DE_DATOS = await respuesta.json();
                
                const select = document.getElementById('select-estructura');
                select.innerHTML = '<option value="">Seleccionar estructura...</option>';
                
                // Rellena la lista desplegable con los nombres que vinieron del Drive
                Object.keys(BASE_DE_DATOS).forEach(nombre => {
                    let opt = document.createElement('option');
                    opt.value = nombre; opt.text = nombre;
                    select.appendChild(opt);
                });
            } catch (error) {
                alert("Error al sincronizar con Google Drive. Recargue la página.");
            }
        }

        // Función que guarda lo que el usuario eligió en el "carrito"
        function agregarEstructura() {
            const sel = document.getElementById('select-estructura');
            const estructura = sel.value;
            const cantidad = parseInt(document.getElementById('input-cantidad').value);

            if (!estructura || cantidad <= 0) return;

            let item = proyecto.find(p => p.nombre === estructura);
            if (item) item.cantidad += cantidad;
            else proyecto.push({ nombre: estructura, cantidad: cantidad });

            actualizarUI();
        }

        // Función que suma los materiales y dibuja la tabla
        function actualizarUI() {
            const ul = document.getElementById('lista-estructuras');
            ul.innerHTML = "";
            let consolidados = {};

            // Dibuja la lista de estructuras agregadas
            proyecto.forEach((p, idx) => {
                ul.innerHTML += `<li><span><b>${p.cantidad}x</b> ${p.nombre}</span><button onclick="proyecto.splice(${idx},1);actualizarUI();" style="color:red; background:none; border:none; cursor:pointer;"><i class="fas fa-trash"></i></button></li>`;
                
                // Hace las sumas matemáticas
                BASE_DE_DATOS[p.nombre].forEach(mat => {
                    if (!consolidados[mat.codigo]) consolidados[mat.codigo] = { ...mat, cantTotal: 0 };
                    consolidados[mat.codigo].cantTotal += (mat.cantidad * p.cantidad);
                });
            });

            // Dibuja la tabla final
            const tbody = document.getElementById('tabla-body-materiales');
            tbody.innerHTML = "";
            Object.values(consolidados).forEach(m => {
                tbody.innerHTML += `<tr><td>${m.cantTotal}</td><td>${m.unidad}</td><td>${m.codigo}</td><td>${m.nombre}</td></tr>`;
            });

            if(proyecto.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color: #9aa7b1;">No hay estructuras</td></tr>`;
            }
        }

        // Función para empezar de cero
        function limpiarProyecto() {
            if(confirm("¿Limpiar cálculo actual?")) {
                proyecto = [];
                actualizarUI();
            }
        }
    </script>
</body>
</html>
