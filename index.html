<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP DE PROYECTOS v5.0 - ENEE</title>
    <script type="text/javascript" src="https://gc.kes.v2.scr.kaspersky-labs.com/7EA5E9BB-55E1-4C31-9C21-4943DDFED2E4/main.js?attr=XMNujd5MtdfnuBPBD_zTunLu47uMxCNkTZ0Mfgw-BSruQjy9rBPRJTV5OZTkqBYXgzu1IOqn2325hUVB5ubQZ3HBBlzqalEzG-95P_zuRxoZeMm90TGUQ_YUAXHlnR4a1UsSd0VG_uTAoq1CBoi8bDmTsf_Gj48TT3DQZwUAzagqHtaEmRFWv0TibophMqkCgT5aBJpnMP_XgHFMV2IfedVte3ovYYhcJnhwMlYEUjFkpqUZaHxTmAuXtB7h88Mo2Q0_KVxfCdOFkIMcvw3YJxKH0bMjgbSvqFg1fGGh1pOUY0zGPxmPBK68pIPbENjq" charset="UTF-8"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --navy: #003366; --bg: #0b141d; --card: #14212d; --text: #ffffff; --rojo: #e74c3c; --verde: #27ae60; --oro: #f1c40f; --gris: #a0aec0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container, .container-login { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        
        /* LOGIN */
        .login-card { background: var(--card); padding: 40px 30px; border-radius: 20px; border: 2px solid var(--navy); text-align: center; margin-top: 60px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .logo-circle { background: white; width: 110px; height: 110px; border-radius: 50%; margin: -90px auto 20px; display: flex; align-items: center; justify-content: center; border: 4px solid var(--navy); overflow: hidden; }
        .logo-circle img { width: 70%; }
        
        /* HEADER */
        header { text-align: center; position: relative; padding-top: 10px; }
        .logo-header { background: white; padding: 5px; border-radius: 8px; display: inline-block; margin-bottom: 5px; width: auto; }
        .logo-header img { max-width: 80px; height: auto; }
        .user-info-bar { background: var(--navy); padding: 8px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 15px; font-weight: bold; text-align: center; border: 1px solid #0056b3; }
        .btn-salir { position: absolute; right: 0; top: 10px; background: rgba(231, 76, 60, 0.1); border: 1px solid var(--rojo); color: var(--rojo); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }

        /* CARDS Y LISTAS */
        .card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--navy); margin-bottom: 15px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 0.5fr; gap: 8px; margin-bottom: 10px; }
        label { display: block; font-size: 0.7rem; font-weight: bold; color: var(--gris); text-transform: uppercase; margin-bottom: 5px; border-left: 3px solid var(--oro); padding-left: 8px; }
        
        .lista-items { list-style: none; padding: 0; margin: 0 0 15px 0;}
        .lista-items li { background: #1b2a36; padding: 12px; border-radius: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; border-left: 4px solid var(--oro);}
        
        .actions { display: flex; gap: 15px; }
        .btn-edit { color: var(--oro); cursor: pointer; }
        .btn-delete { color: var(--rojo); cursor: pointer; }

        /* TABLAS */
        .tabla-materiales { width: 100%; border-collapse: collapse; font-size: 0.65rem; }
        .tabla-materiales th { background: #1b2a36; padding: 8px; color: var(--gris); border-bottom: 1px solid var(--navy); }
        .tabla-materiales td { padding: 8px; border-bottom: 1px solid #2d3748; text-align: center; }

        /* MODAL AVANZADO */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 5% auto; padding: 20px; border: 1px solid var(--oro); width: 95%; max-width: 650px; border-radius: 20px; }
        .scroll-edit { max-height: 300px; overflow-y: auto; margin: 15px 0; border: 1px solid #2d3748; border-radius: 10px; }
        
        .add-row-zone { display: grid; grid-template-columns: 1fr 2fr 0.5fr 0.5fr auto; gap: 5px; background: #1b2a36; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .add-row-zone input { background: var(--bg); border: 1px solid var(--navy); color: white; padding: 8px; border-radius: 5px; font-size: 0.75rem; width: 100%; }
        
        /* BOTONES GENERALES */
        input, select { background: #1b2a36; border: 1px solid var(--navy); color: white; padding: 10px; border-radius: 8px; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        .btn-enviar { background: var(--verde); color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-secundario { background: transparent; border: 2px solid var(--navy); color: white; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div id="login-container" class="container-login">
        <div class="login-card">
            <div class="logo-circle"><img src="https://raw.githubusercontent.com/josueortizp87-code/App-Cuadrillas-Distribucion/refs/heads/main/imagenes/UTCD%20Vertical.png"></div>
            <h2 style="letter-spacing: 1px; margin-bottom: 5px;">APP DE PROYECTOS</h2>
            <small style="color: var(--oro); display: block; margin-bottom: 20px; font-weight: bold;">Versión 5.0</small>
            
            <div style="text-align: left;">
                <label style="border:none; padding:0; margin-bottom:5px;">Usuario:</label>
                <select id="user" style="margin-bottom:15px;"><option value="">Cargando lista...</option></select>
                
                <label style="border:none; padding:0; margin-bottom:5px;">Contraseña:</label>
                <input type="password" id="pass" placeholder="••••••••" style="margin-bottom:25px;">
            </div>
            
            <button class="btn-enviar" onclick="validarLogin()" style="background:var(--navy)">INICIAR SESIÓN</button>
        </div>
    </div>

    <div id="app-container" class="container" style="display: none;">
        <header>
            <button class="btn-salir" onclick="cerrarSesion()">SALIR</button>
            <div class="logo-header"><img id="main-logo" src="https://raw.githubusercontent.com/josueortizp87-code/App-Cuadrillas-Distribucion/refs/heads/main/imagenes/UTCD%20Vertical.png"></div>
            <h1 style="font-size: 1.4rem; margin: 10px 0;">SISTEMA DE MATERIALES</h1>
            <div id="user-display" class="user-info-bar"></div>
        </header>

        <div class="card">
            <label>Selección de Estructura</label>
            <div class="grid-inputs">
                <select id="select-tipo" onchange="filtrarEstructuras()"><option value="">Tipo...</option></select>
                <select id="select-estructura"><option value="">Estructura...</option></select>
                <input type="number" id="input-cantidad" value="1" min="1">
            </div>
            <button class="btn-secundario" onclick="agregarEstructura()">AÑADIR A LISTA</button>
        </div>

        <ul id="lista-estructuras" class="lista-items"></ul>

        <div class="card" style="padding:0; overflow:hidden;">
            <table class="tabla-materiales">
                <thead>
                    <tr><th>CÓDIGO</th><th>DESCRIPCIÓN</th><th>UNID</th><th>CANT. TOTAL</th></tr>
                </thead>
                <tbody id="tabla-body"></tbody>
            </table>
        </div>
        
        <button class="btn-enviar" onclick="imprimirPDF()"><i class="fas fa-file-pdf"></i> GENERAR REPORTE PDF</button>
    </div>

    <div id="modalEdicion" class="modal">
        <div class="modal-content">
            <h3 style="margin:0 0 10px 0; color:var(--oro); text-align:center;">EDITAR ESTRUCTURA: <span id="nom-est-modal"></span></h3>
            
            <label>Añadir Material:</label>
            <div class="add-row-zone">
                <input type="text" id="new-cod" placeholder="Código" oninput="buscarPorCodigo(this.value)">
                <input type="text" id="new-desc" placeholder="Descripción" oninput="buscarPorDesc(this.value)">
                <input type="text" id="new-unid" placeholder="UND" readonly style="background:#0b141d; color:var(--gris);">
                <input type="number" id="new-cant" value="1" step="0.01">
                <button onclick="agregarMaterialFila()" style="background:var(--verde); color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;"><i class="fas fa-plus"></i></button>
            </div>

            <div class="scroll-edit">
                <table class="tabla-materiales">
                    <thead style="position: sticky; top: 0; z-index:10; background:#1b2a36;">
                        <tr><th>CÓDIGO</th><th>DESCRIPCIÓN</th><th>UNID</th><th>CANT</th><th></th></tr>
                    </thead>
                    <tbody id="modal-table-body"></tbody>
                </table>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn-secundario" onclick="cerrarModal()">CANCELAR</button>
                <button class="btn-enviar" id="btn-save-modal" onclick="guardarCambiosModal()">GUARDAR CAMBIOS</button>
            </div>
        </div>
    </div>

    <script>
        const URL_USUARIOS = "https://script.google.com/macros/s/AKfycbywo11Ceg6g49JwlERQymF7Ia-T_gDKrKXFnhH7LcBkSaWKyLYq0P0YwK9a2CVZP-NkAQ/exec";
        
        /* --- NUEVA URL DE MATERIALES ACTUALIZADA --- */
        const URL_MATERIALES = "https://script.google.com/macros/s/AKfycbxG9DgY1L8mjY0B4cwHdEOUhrzfF6wDf-h5q-ZooxWotaoJm-Gr2xTTmrdTwa2NwIivew/exec";

        let BASE_DE_DATOS = {}; let LISTA_MAESTRA = []; let proyecto = []; 
        let estructuraEnEdicion = ""; let materialesTemporales = [];
        let nombreUsuario = ""; let sectorUsuario = "";

        window.onload = () => {
            const script = document.createElement('script');
            script.src = `${URL_USUARIOS}?action=getUsers&callback=llenarUsuarios`;
            document.body.appendChild(script);
        };

        window.llenarUsuarios = (d) => {
            const s = document.getElementById('user');
            s.innerHTML = '<option value="">Seleccione Usuario...</option>';
            d.usuarios.forEach(u => s.innerHTML += `<option value="${u}">${u}</option>`);
        };

        function cargarDatos() {
            const script = document.createElement('script');
            script.src = `${URL_MATERIALES}?callback=procesarTodo`;
            document.body.appendChild(script);
        }

        window.procesarTodo = (data) => {
            BASE_DE_DATOS = data;
            let unicos = {};
            Object.values(data).forEach(est => {
                est.forEach(m => { unicos[m.codigo] = { codigo: m.codigo, nombre: m.nombre, unidad: m.unidad }; });
            });
            LISTA_MAESTRA = Object.values(unicos);
            
            const tipos = [...new Set(Object.keys(data).map(n => n.split('-')[0]))].sort();
            const st = document.getElementById('select-tipo');
            st.innerHTML = '<option value="">Tipo...</option>';
            tipos.forEach(t => st.innerHTML += `<option value="${t}">${t}</option>`);
            actualizarVista();
        };

        function validarLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(!u || !p) return;
            const script = document.createElement('script');
            script.src = `${URL_USUARIOS}?action=login&user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}&callback=resLogin`;
            document.body.appendChild(script);
        }

        window.resLogin = (r) => {
            if(r.success) {
                nombreUsuario = document.getElementById('user').value;
                sectorUsuario = r.sector || "General";
                document.getElementById('login-container').style.display='none';
                document.getElementById('app-container').style.display='block';
                document.getElementById('user-display').innerHTML = `<i class="fas fa-hard-hat"></i> ${nombreUsuario} | <i class="fas fa-location-dot"></i> ${sectorUsuario}`;
                cargarDatos();
            } else alert("Error de credenciales");
        };

        function filtrarEstructuras() {
            const t = document.getElementById('select-tipo').value;
            const se = document.getElementById('select-estructura');
            se.innerHTML = '<option value="">Estructura...</option>';
            Object.keys(BASE_DE_DATOS).filter(n => n.startsWith(t)).sort().forEach(n => se.innerHTML += `<option value="${n}">${n}</option>`);
        }

        function agregarEstructura() {
            const n = document.getElementById('select-estructura').value;
            const c = parseInt(document.getElementById('input-cantidad').value);
            if(!n || c <= 0) return;
            let existe = proyecto.find(p => p.nombre === n);
            if(existe) existe.cantidad += c; else proyecto.push({nombre: n, cantidad: c});
            actualizarVista();
        }

        function actualizarVista() {
            const ul = document.getElementById('lista-estructuras');
            const tb = document.getElementById('tabla-body');
            ul.innerHTML = ""; tb.innerHTML = "";
            let totales = {};

            proyecto.forEach((p, idx) => {
                ul.innerHTML += `<li>
                    <span><b style="color:var(--oro)">${p.cantidad}x</b> ${p.nombre}</span>
                    <div class="actions">
                        <i class="fas fa-edit btn-edit" onclick="abrirModal('${p.nombre}')"></i>
                        <i class="fas fa-trash-alt btn-delete" onclick="proyecto.splice(${idx},1);actualizarVista()"></i>
                    </div>
                </li>`;
                if(BASE_DE_DATOS[p.nombre]) {
                    BASE_DE_DATOS[p.nombre].forEach(m => {
                        if(!totales[m.codigo]) totales[m.codigo] = {...m, cantTotal: 0};
                        totales[m.codigo].cantTotal += (m.cantidad * p.cantidad);
                    });
                }
            });
            Object.values(totales).forEach(m => {
                tb.innerHTML += `<tr><td>${m.codigo}</td><td style="text-align:left">${m.nombre}</td><td>${m.unidad}</td><td><b>${m.cantTotal.toFixed(2)}</b></td></tr>`;
            });
            if(proyecto.length === 0) tb.innerHTML = '<tr><td colspan="4" style="color:var(--gris); padding:10px;">No se han añadido estructuras</td></tr>';
        }

        function abrirModal(nom) {
            estructuraEnEdicion = nom;
            document.getElementById('nom-est-modal').innerText = nom;
            materialesTemporales = JSON.parse(JSON.stringify(BASE_DE_DATOS[nom] || []));
            renderTablaModal();
            document.getElementById('modalEdicion').style.display = 'block';
        }

        function renderTablaModal() {
            const tb = document.getElementById('modal-table-body');
            tb.innerHTML = "";
            materialesTemporales.forEach((m, idx) => {
                tb.innerHTML += `<tr>
                    <td>${m.codigo}</td>
                    <td style="text-align:left; font-size:0.6rem;">${m.nombre}</td>
                    <td>${m.unidad}</td>
                    <td><input type="number" step="0.01" value="${m.cantidad}" onchange="materialesTemporales[${idx}].cantidad = parseFloat(this.value)" style="width:60px; padding:2px; text-align:center; background:var(--bg); border:1px solid var(--navy); color:var(--oro);"></td>
                    <td><i class="fas fa-times-circle" style="color:var(--rojo); cursor:pointer;" onclick="materialesTemporales.splice(${idx},1);renderTablaModal()"></i></td>
                </tr>`;
            });
        }

        function buscarPorCodigo(val) {
            let m = LISTA_MAESTRA.find(i => String(i.codigo).trim() === String(val).trim());
            if(m) { 
                document.getElementById('new-desc').value = m.nombre;
                document.getElementById('new-unid').value = m.unidad;
            } else {
                document.getElementById('new-desc').value = "";
                document.getElementById('new-unid').value = "";
            }
        }

        function buscarPorDesc(val) {
            if(val.length < 4) return;
            let m = LISTA_MAESTRA.find(i => i.nombre.toLowerCase().includes(val.toLowerCase()));
            if(m) {
                document.getElementById('new-cod').value = m.codigo;
                document.getElementById('new-unid').value = m.unidad;
            }
        }

        function agregarMaterialFila() {
            const cod = document.getElementById('new-cod').value;
            const desc = document.getElementById('new-desc').value;
            const unid = document.getElementById('new-unid').value;
            const cant = parseFloat(document.getElementById('new-cant').value);
            if(!cod || !desc || cant <= 0) return;
            materialesTemporales.push({ codigo: cod, nombre: desc, unidad: unid, cantidad: cant });
            renderTablaModal();
            ['new-cod','new-desc','new-unid'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('new-cant').value = 1;
        }

        async function guardarCambiosModal() {
            const btn = document.getElementById('btn-save-modal');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> GUARDANDO...';
            btn.disabled = true;

            const datos = {
                action: "updateFullEstructura",
                estructura: estructuraEnEdicion,
                materiales: materialesTemporales
            };

            try {
                await fetch(URL_MATERIALES, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(datos)
                });
                
                BASE_DE_DATOS[estructuraEnEdicion] = JSON.parse(JSON.stringify(materialesTemporales));
                alert("✅ Datos enviados. Verifique su Excel.");
                cerrarModal();
                actualizarVista();
            } catch(e) { 
                alert("Error de conexión al guardar."); 
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function cerrarModal() { document.getElementById('modalEdicion').style.display='none'; }
        function cerrarSesion() { location.reload(); }

        async function imprimirPDF() {
            if (proyecto.length === 0) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const fechaActual = new Date().toLocaleDateString();
            
            doc.setDrawColor(0); doc.setLineWidth(0.5); doc.rect(5, 5, 200, 287);
            doc.rect(10, 10, 50, 30);
            try { const img = document.getElementById('main-logo'); doc.addImage(img, 'PNG', 12, 12, 46, 26); } catch(e) {}
            doc.rect(60, 10, 90, 30);
            doc.setFont("helvetica", "bold"); doc.setFontSize(11);
            doc.text("REPORTE TÉCNICO DE MATERIALES", 105, 22, { align: 'center' });
            doc.text(`SECTOR: ${sectorUsuario.toUpperCase()}`, 105, 32, { align: 'center' });
            
            doc.rect(150, 10, 50, 30);
            doc.setFontSize(8); doc.text("Fecha Emisión:", 152, 18); doc.text(fechaActual, 175, 18);
            doc.text("Responsable:", 152, 28); doc.setFontSize(7); doc.text(nombreUsuario, 152, 33);

            let totales = {};
            proyecto.forEach(p => {
                if(BASE_DE_DATOS[p.nombre]) {
                    BASE_DE_DATOS[p.nombre].forEach(m => {
                        if(!totales[m.codigo]) totales[m.codigo] = {...m, cantTotal: 0};
                        totales[m.codigo].cantTotal += (m.cantidad * p.cantidad);
                    });
                }
            });

            let dataMat = Object.values(totales).map(m => [m.codigo, m.nombre, m.unidad, m.cantTotal.toFixed(2)]);
            doc.autoTable({
                startY: 45, head: [['CÓDIGO', 'DESCRIPCIÓN DEL MATERIAL', 'UND', 'CANT.']], body: dataMat, theme: 'grid',
                headStyles: { fillColor: [0, 51, 102], textColor: [255, 255, 255], halign: 'center' },
                styles: { fontSize: 8, cellPadding: 2 },
                columnStyles: { 0: { cellWidth: 30, halign: 'center' }, 2: { cellWidth: 20, halign: 'center' }, 3: { cellWidth: 20, halign: 'center' } }
            });
            
            doc.save(`Reporte_v5_${nombreUsuario}.pdf`);
        }
    </script>
</body>
</html>
