<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE - Gestión de Materiales</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container" class="container-login">
        <div class="login-card">
            <div class="logo-circle">
                <img src="https://raw.githubusercontent.com/josueortizp87-code/App-Cuadrillas-Distribucion/refs/heads/main/imagenes/UTCD%20Vertical.png" alt="Logo">
            </div>
            <h2>INICIAR SESIÓN</h2>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <select id="user">
                    <option value="">Seleccione su Usuario...</option>
                    <option value="ADMIN">ADMIN</option>
                    <option value="ALLAN.MUÑOZ">ALLAN.MUÑOZ</option>
                    <option value="ALLAN.ZELAYA">ALLAN.ZELAYA</option>
                    <option value="ALSIDES.PONCE">ALSIDES.PONCE</option>
                    <option value="AXEL.IRIAS">AXEL.IRIAS</option>
                    <option value="CARLOS ROMERO">CARLOS ROMERO</option>
                    <option value="CARLOS.RIVERA">CARLOS.RIVERA</option>
                    <option value="JONATHAN ORTIZ">JONATHAN ORTIZ</option>
                    <option value="JOSE PINTO">JOSE PINTO</option>
                    <option value="JOSUE.ORTIZ">JOSUE.ORTIZ</option>
                    <option value="JUAN MIRANDA">JUAN MIRANDA</option>
                    <option value="RENE ALEGRIA">RENE ALEGRIA</option>
                    <option value="WILSON.ZAVALA">WILSON.ZAVALA</option>
                </select>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="pass" placeholder="Contraseña">
            </div>
            
            <button class="btn-login" onclick="validarLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="app-container" class="container" style="display: none;">
        <header>
            <button class="btn-salir" onclick="cerrarSesion()">SALIR</button>
            <div class="logo-header" style="text-align: center;">
                <img src="https://raw.githubusercontent.com/josueortizp87-code/App-Cuadrillas-Distribucion/refs/heads/main/imagenes/UTCD%20Vertical.png" alt="ENEE">
            </div>
            <h1 style="text-align: center; font-size: 1.2rem;">CÁLCULO DE MATERIALES</h1>
            <div class="user-info-bar">
                <i class="fas fa-id-badge"></i> <span id="user-display"></span>
            </div>
        </header>

        <div class="card">
            <label>Selección de Estructura:</label>
            <div class="grid-especial">
                <select id="select-tipo" onchange="filtrarEstructuras()">
                    <option value="">Tipo...</option>
                </select>
                <select id="select-estructura">
                    <option value="">Estructura...</option>
                </select>
                <input type="number" id="input-cantidad" min="1" value="1">
            </div>
            <button class="btn-secundario" onclick="agregarEstructura()">
                <i class="fas fa-plus"></i> AÑADIR AL PROYECTO
            </button>
        </div>

        <ul id="lista-estructuras" class="lista-items"></ul>

        <div class="resumen-box">
            <div class="resumen-header">CONSOLIDADO TOTAL</div>
            <div class="table-wrapper">
                <table class="tabla-materiales">
                    <thead>
                        <tr><th>CANT.</th><th>UND</th><th>CÓDIGO</th><th>DESCRIPCIÓN</th></tr>
                    </thead>
                    <tbody id="tabla-body">
                        <tr><td colspan="4">No hay datos agregados</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <button class="btn-enviar" onclick="imprimirPDF()">
            <i class="fas fa-file-pdf"></i> GENERAR REPORTE PDF
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
