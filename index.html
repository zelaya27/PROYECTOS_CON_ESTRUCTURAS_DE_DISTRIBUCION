<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE - Gestión de Materiales</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --navy: #003366; --bg: #0b141d; --card: #14212d; --text: #ffffff; --rojo: #e74c3c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container, .container-login { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        
        /* LOGIN */
        .login-card { background: var(--card); padding: 40px 30px; border-radius: 20px; border: 2px solid var(--navy); text-align: center; margin-top: 60px; }
        .logo-circle { background: white; width: 110px; height: 110px; border-radius: 50%; margin: -90px auto 20px; display: flex; align-items: center; justify-content: center; border: 4px solid var(--navy); overflow: hidden; }
        .logo-circle img { width: 70%; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 14px; color: var(--navy); }
        .input-group input, .input-group select { width: 100%; padding: 12px 12px 12px 40px; background: #1b2a36; border: 1px solid var(--navy); border-radius: 10px; color: white; box-sizing: border-box; font-size: 0.9rem; appearance: none; outline: none; cursor: pointer;}
        .btn-login { background: var(--navy); color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px;}
        
        /* APP PRINCIPAL */
        .logo-header { background: white; padding: 10px; border-radius: 10px; display: inline-block; margin-bottom: 10px; }
        .logo-header img { max-width: 130px; }
        .user-info-bar { background: var(--navy); padding: 8px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 20px; font-weight: bold; text-align: center;}
        .card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--navy); margin-bottom: 20px; }
        .grid-especial { display: grid; grid-template-columns: 1fr 2fr 0.7fr; gap: 8px; margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: bold; color: #a0aec0; text-transform: uppercase; margin-bottom: 5px; border-left: 3px solid var(--navy); padding-left: 8px; text-align: left; }
        select, input[type="number"] { background: #1b2a36; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box;}
        
        /* BOTONES APP */
        .btn-secundario { background: transparent; border: 2px solid var(--navy); color: white; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold;}
        .btn-enviar { background: var(--navy); color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px;}
        .btn-salir { position: absolute; right: 15px; top: 15px; background: none; border: 1px solid var(--rojo); color: var(--rojo); padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; }
        
        /* TABLAS Y LISTAS */
        .resumen-box { background: var(--card); border: 1px solid var(--navy); border-radius: 10px; overflow: hidden; margin-top: 10px;}
        .resumen-header { background: var(--navy); padding: 8px; text-align: center; font-size: 0.8rem; font-weight: bold; }
        .table-wrapper { overflow-x: auto; }
        .tabla-materiales { width: 100%; border-collapse: collapse; font-size: 0.65rem; }
        .tabla-materiales th { background: #1b2a36; padding: 10px; text-align: center; border-bottom: 1px solid var(--navy); }
        .tabla-materiales td { padding: 8px; border-bottom: 1px solid #2d3748; text-align: center; }
        .lista-items { list-style: none; padding: 0; margin: 0 0 20px 0;}
        .lista-items li { background: #1b2a36; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: 0.85rem; border-left: 3px solid var(--navy);}
        .lista-items i { color: var(--rojo); cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-container" class="container-login">
        <div class="login-card">
            <div class="logo-circle">
                <img src="https://raw.githubusercontent.com/josueortizp87-code/App-Cuadrillas-Distribucion/refs/heads/main/imagenes/UTCD%20Vertical.png" alt="Logo">
            </div>
            <h2>INICIAR SESIÓN</h2>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <select id="user">
                    <option value="">Seleccione su Usuario...</option>
                    <option value="ADMIN">ADMIN</option>
                    <option value="ALLAN.MUÑOZ">ALLAN.MUÑOZ</option>
                    <option value="ALLAN.ZELAYA">ALLAN.ZELAYA</option>
                    <option value="ALSIDES.PONCE">ALSIDES.PONCE</option>
                    <option value="AXEL.IRIAS">AXEL.IRIAS</option>
                    <option value="CARLOS ROMERO">CARLOS ROMERO</option>
                    <option value="CARLOS.RIVERA">CARLOS.RIVERA</option>
                    <option value="JONATHAN ORTIZ">JONATHAN ORTIZ</option>
                    <option value="JOSE PINTO">JOSE PINTO</option>
                    <option value="JOSUE.ORTIZ">JOSUE.ORTIZ</option>
                    <option value="JUAN MIRANDA">JUAN MIRANDA</option>
                    <option value="RENE ALEGRIA">RENE ALEGRIA</option>
                    <option value="WILSON.ZAVALA">WILSON.ZAVALA</option>
                </select>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="pass" placeholder="Contraseña">
            </div>
            
            <button class="btn-login" onclick="validarLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="app-container" class="container" style="display: none;">
        <header>
            <button class="btn-salir" onclick="cerrarSesion()">SALIR</button>
            <div class="logo-header" style="text-align: center;">
                <img src="https://raw.githubusercontent.com/josueortizp87-code/App-Cuadrillas-Distribucion/refs/heads/main/imagenes/UTCD%20Vertical.png" alt="ENEE">
            </div>
            <h1 style="text-align: center; font-size: 1.2rem;">CÁLCULO DE MATERIALES</h1>
            <div class="user-info-bar">
                <i class="fas fa-id-badge"></i> <span id="user-display"></span>
            </div>
        </header>

        <div class="card">
            <label>Selección de Estructura:</label>
            <div class="grid-especial">
                <select id="select-tipo" onchange="filtrarEstructuras()">
                    <option value="">Tipo...</option>
                </select>
                <select id="select-estructura">
                    <option value="">Estructura...</option>
                </select>
                <input type="number" id="input-cantidad" min="1" value="1">
            </div>
            <button class="btn-secundario" onclick="agregarEstructura()">
                <i class="fas fa-plus"></i> AÑADIR AL PROYECTO
            </button>
        </div>

        <ul id="lista-estructuras" class="lista-items"></ul>

        <div class="resumen-box">
            <div class="resumen-header">CONSOLIDADO TOTAL</div>
            <div class="table-wrapper">
                <table class="tabla-materiales">
                    <thead>
                        <tr><th>CANT.</th><th>UND</th><th>CÓDIGO</th><th>DESCRIPCIÓN</th></tr>
                    </thead>
                    <tbody id="tabla-body">
                        <tr><td colspan="4">No hay datos agregados</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <button class="btn-enviar" onclick="imprimirPDF()">
            <i class="fas fa-file-pdf"></i> GENERAR REPORTE PDF
        </button>
    </div>

    <script>
        // 1. Diccionario de Claves y Sectores
        const USUARIOS = {
            "ADMIN": { pass: "admin123", sector: "TEGUCIGALPA" },
            "ALLAN.MUÑOZ": { pass: "12345", sector: "TOCOA" },
            "ALLAN.ZELAYA": { pass: "12345", sector: "JUTICALPA" },
            "ALSIDES.PONCE": { pass: "12345", sector: "TOCOA" },
            "AXEL.IRIAS": { pass: "12345", sector: "TOCOA" },
            "CARLOS ROMERO": { pass: "12345", sector: "SANTA ROSA DE COPAN" },
            "CARLOS.RIVERA": { pass: "12345", sector: "LA CEIBA" },
            "JONATHAN ORTIZ": { pass: "12345", sector: "TEGUCIGALPA" },
            "JOSE PINTO": { pass: "12345", sector: "TEGUCIGALPA" },
            "JOSUE.ORTIZ": { pass: "12345", sector: "JUTICALPA" },
            "JUAN MIRANDA": { pass: "12345", sector: "SANTA ROSA DE COPAN" },
            "RENE ALEGRIA": { pass: "12345", sector: "TEGUCIGALPA" },
            "WILSON.ZAVALA": { pass: "12345", sector: "LA CEIBA" }
        };

        const URL_MATERIALES = "https://script.google.com/macros/s/AKfycbyWyp1BupM-yySWEi7uEbE5jbslKh9JCjR0BuQjCLD14PnP3E01O9alYDirJPB-7U5zgA/exec";

        let BASE_DE_DATOS = {}; 
        let DATOS_POR_TIPO = {}; 
        let proyecto = []; 
        let sectorActivo = "";
        let nombreUsuario = "";

        // 2. Función de Login
        function validarLogin() {
            const u = document.getElementById('user').value; 
            const p = document.getElementById('pass').value.trim();

            if (u === "") {
                alert("Por favor, seleccione un usuario de la lista.");
                return;
            }
            if (p === "") {
                alert("Por favor, ingrese su contraseña.");
                return;
            }

            if (USUARIOS[u] && USUARIOS[u].pass === p) {
                nombreUsuario = u;
                sectorActivo = USUARIOS[u].sector;
                
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('user-display').innerText = `BIENVENIDO: ${nombreUsuario} | SECTOR: ${sectorActivo}`;
                
                cargarDatosMateriales();
            } else {
                alert("❌ Contraseña incorrecta para el usuario " + u);
            }
        }

        // 3. Descargar Materiales de Google Sheets
        async function cargarDatosMateriales() {
            try {
                const res = await fetch(URL_MATERIALES);
                BASE_DE_DATOS = await res.json();
                DATOS_POR_TIPO = {}; 

                Object.keys(BASE_DE_DATOS).forEach(nombre => {
                    const material = BASE_DE_DATOS[nombre][0];
                    const tipo = material.tipo || nombre.charAt(0).toUpperCase();
                    if (!DATOS_POR_TIPO[tipo]) DATOS_POR_TIPO[tipo] = [];
                    DATOS_POR_TIPO[tipo].push(nombre);
                });

                const selectTipo = document.getElementById('select-tipo');
                selectTipo.innerHTML = '<option value="">Tipo...</option>';
                Object.keys(DATOS_POR_TIPO).sort().forEach(t => {
                    selectTipo.innerHTML += `<option value="${t}">${t}</option>`;
                });
            } catch (error) {
                alert("Error al conectar con la base de Google Sheets.");
            }
        }

        // 4. Filtrar Estructuras
        function filtrarEstructuras() {
            const tipo = document.getElementById('select-tipo').value;
            const selectEst = document.getElementById('select-estructura');
            selectEst.innerHTML = '<option value="">Estructura...</option>';
            
            if (tipo && DATOS_POR_TIPO[tipo]) {
                DATOS_POR_TIPO[tipo].sort().forEach(nombre => {
                    selectEst.innerHTML += `<option value="${nombre}">${nombre}</option>`;
                });
            }
        }

        // 5. Agregar al Proyecto
        function agregarEstructura() {
            const nombre = document.getElementById('select-estructura').value;
            const cant = parseInt(document.getElementById('input-cantidad').value);
            
            if (!nombre || cant <= 0) {
                alert("Seleccione una estructura válida y cantidad mayor a 0.");
                return;
            }

            let itemExistente = proyecto.find(p => p.nombre === nombre);
            if (itemExistente) itemExistente.cantidad += cant;
            else proyecto.push({ nombre: nombre, cantidad: cant });
            
            actualizarVista();
        }

        // 6. Dibujar Tabla y Lista
        function actualizarVista() {
            const ulLista = document.getElementById('lista-estructuras');
            const tbodyTabla = document.getElementById('tabla-body');
            ulLista.innerHTML = ""; tbodyTabla.innerHTML = "";
            let materialesTotales = {}; 

            proyecto.forEach((item, index) => {
                ulLista.innerHTML += `<li><span><b>${item.cantidad}x</b> ${item.nombre}</span><i class="fas fa-trash-alt" title="Eliminar" onclick="eliminarItem(${index})"></i></li>`;
                BASE_DE_DATOS[item.nombre].forEach(mat => {
                    if (!materialesTotales[mat.codigo]) materialesTotales[mat.codigo] = { ...mat, total: 0 };
                    materialesTotales[mat.codigo].total += (mat.cantidad * item.cantidad);
                });
            });

            Object.values(materialesTotales).forEach(m => {
                tbodyTabla.innerHTML += `<tr><td>${m.total}</td><td>${m.unidad}</td><td>${m.codigo}</td><td>${m.nombre}</td></tr>`;
            });

            if (proyecto.length === 0) tbodyTabla.innerHTML = '<tr><td colspan="4">No hay datos agregados</td></tr>';
        }

        function eliminarItem(index) {
            proyecto.splice(index, 1);
            actualizarVista(); 
        }

        function cerrarSesion() { location.reload(); }

        function imprimirPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("CONSOLIDADO DE MATERIALES - ENEE", 10, 10);
            doc.text(`USUARIO: ${nombreUsuario} | SECTOR: ${sectorActivo}`, 10, 20);
            doc.save(`Materiales_${sectorActivo}.pdf`);
        }
    </script>
</body>
</html>
