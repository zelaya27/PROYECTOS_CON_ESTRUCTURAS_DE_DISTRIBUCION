<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE - Calculadora de Materiales</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div id="login-container" class="container">
    <header>
        <div style="background-color: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: center;">
            <img src="https://raw.githubusercontent.com/josueortizp87-code/App-Cuadrillas-Distribucion/refs/heads/main/imagenes/UTCD%20Vertical.png" alt="Logo ENEE" style="max-width: 250px; height: auto;">
        </div>
        <h1>Acceso al Sistema</h1>
    </header>
    <div class="card" style="padding: 20px;">
        <label>Seleccione su Sector:</label>
        <select id="user">
            <option value="">Seleccione...</option>
            <option value="juticalpa">JUTICALPA</option>
            <option value="la ceiba">LA CEIBA</option>
            <option value="san pedro sula">SAN PEDRO SULA</option>
            <option value="tegucigalpa">TEGUCIGALPA</option>
            <option value="danli">DANLÍ</option>
            <option value="choluteca">CHOLUTECA</option>
        </select>

        <label>Contraseña:</label>
        <input type="password" id="pass" placeholder="Ingrese su contraseña">
        
        <button class="btn-enviar" onclick="validarLogin()">INGRESAR</button>
        <p id="login-error" style="color: #e74c3c; font-size: 0.8rem; margin-top: 10px; display: none;">Credenciales incorrectas</p>
    </div>
</div>

<div id="app-container" class="container" style="display: none;">
    <header>
        <div style="background-color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: center;">
            <img src="https://raw.githubusercontent.com/josueortizp87-code/App-Cuadrillas-Distribucion/refs/heads/main/imagenes/UTCD%20Vertical.png" alt="Logo ENEE" style="max-width: 180px; height: auto;">
        </div>
        <h1>CÁLCULO DE MATERIALES</h1>
        <p id="user-display" style="color: white; font-weight: bold; font-size: 0.8rem; background: #003366; display: inline-block; padding: 5px 15px; border-radius: 20px;"></p>
    </header>

    <div class="card" style="text-align: left;">
        <label>Estructura a agregar:</label>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
            <select id="select-estructura" style="flex: 3;">
                <option value="">Cargando estructuras...</option>
            </select>
            <input type="number" id="input-cantidad" min="1" value="1" style="flex: 1; text-align: center;">
        </div>
        
        <button type="button" class="btn-secundario" onclick="agregarEstructura()">
            <i class="fas fa-plus"></i> AÑADIR ESTRUCTURA
        </button>
    </div>

    <label>Estructuras en el Proyecto:</label>
    <ul id="lista-estructuras" class="lista-agregados">
        </ul>

    <div class="resumen-container">
        <h3 style="color: white; margin-top: 0; font-size: 0.9rem; text-align: center; text-transform: uppercase; letter-spacing: 1px;">Consolidado de Materiales</h3>
        <table class="tabla-materiales">
            <thead>
                <tr>
                    <th style="width: 15%; text-align: center;">CANT.</th>
                    <th style="width: 15%; text-align: center;">UNIDAD</th>
                    <th style="width: 20%; text-align: center;">CÓDIGO</th>
                    <th>DESCRIPCIÓN</th>
                </tr>
            </thead>
            <tbody id="tabla-body-materiales">
                <tr><td colspan="4" style="text-align:center; color: #9aa7b1; padding: 20px;">No hay estructuras en la lista</td></tr>
            </tbody>
        </table>
    </div>

    <button type="button" class="btn-enviar" onclick="limpiarProyecto()" style="background: #c0392b; margin-bottom: 30px;">
        <i class="fas fa-trash-alt"></i> REINICIAR CÁLCULO
    </button>
</div>

<script src="app.js"></script>
</body>
</html>
